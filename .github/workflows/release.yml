name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-14
            goos: darwin
            goarch: arm64
            cgo: "1"
          - os: macos-14
            goos: darwin
            goarch: amd64
            cgo: "1"
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            cgo: "0"
          - os: ubuntu-latest
            goos: linux
            goarch: arm64
            cgo: "0"
          - os: ubuntu-latest
            goos: windows
            goarch: amd64
            cgo: "0"
          - os: ubuntu-latest
            goos: windows
            goarch: arm64
            cgo: "0"
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: stable
          cache-dependency-path: tray/go.sum

      - name: Build
        working-directory: tray
        shell: bash
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: ${{ matrix.cgo }}
        run: |
          EXT=""
          LDFLAGS="-s -w"
          if [ "$GOOS" = "windows" ]; then
            EXT=".exe"
            LDFLAGS="$LDFLAGS -H=windowsgui"
          fi
          mkdir -p ../dist
          go build -trimpath -ldflags="$LDFLAGS" \
            -o "../dist/claude-semaphore-$GOOS-$GOARCH$EXT" .

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
